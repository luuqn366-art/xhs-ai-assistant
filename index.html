<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI小红书助手</title>

<style>
body{
max-width:800px;
margin:40px auto;
font-family:Arial;
padding:20px;
}

textarea{
width:100%;
height:120px;
}

button{
margin-top:10px;
padding:10px 20px;
}

#result{
white-space:pre-wrap;
margin-top:20px;
border:1px solid #ddd;
padding:15px;
}
</style>

</head>
<body>

<h1>AI小红书助手</h1>

<textarea
id="input"
placeholder="输入：诺基亚8800">
</textarea>

<br>

<button onclick="generate()">
生成
</button>

<div id="result"></div>

<script>

async function generate(){

const input =
document.getElementById("input").value;

const response =
await fetch(
"http://localhost:3001/api/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
input
})
}
);

const data =
await response.json();

document.getElementById("result")
.innerText =
data.result;

}

</script>

</body>
</html>
