<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<title>AI小红书助手</title>

<style>

body{
max-width:800px;
margin:40px auto;
font-family:Arial;
padding:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
}

button{
margin-top:10px;
padding:10px 20px;
cursor:pointer;
}

#result{
white-space:pre-wrap;
margin-top:20px;
border:1px solid #ddd;
padding:15px;
min-height:100px;
}

</style>

</head>

<body>

<h1>AI小红书助手</h1>

<textarea
id="input"
placeholder="例如：诺基亚8800、iPhone4、魅族M8">
</textarea>

<br>

<button onclick="generate()">
生成
</button>

<div id="result"></div>

<script>

async function generate(){

const input =
document.getElementById("input").value;

if(!input){
alert("请输入内容");
return;
}

document.getElementById("result").innerText =
"正在生成...";

try{

const response =
await fetch(
"/api/generate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
input
})
}
);

const data =
await response.json();

document.getElementById("result")
.innerText =
data.result || data.error;

}catch(error){

document.getElementById("result")
.innerText =
error.message;

}

}

</script>

</body>

</html>
