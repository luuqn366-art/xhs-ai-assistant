<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旧机工坊</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f5f5f5;
font-family:
-apple-system,
BlinkMacSystemFont,
"PingFang SC",
sans-serif;
padding-bottom:40px;
}

.header{
background:#ff2442;
color:#fff;
text-align:center;
padding:22px 15px;
font-size:24px;
font-weight:700;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.subtitle{
margin-top:6px;
font-size:12px;
opacity:.9;
font-weight:400;
}

.container{
width:100%;
max-width:760px;
margin:auto;
padding:12px;
}

.input-card{
background:#fff;
border-radius:16px;
padding:14px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

textarea{
width:100%;
height:120px;
border:none;
outline:none;
resize:none;
font-size:15px;
line-height:1.6;
}

.main-btn{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:#ff2442;
color:white;
font-size:15px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.card{
background:white;
margin-top:14px;
padding:16px;
border-radius:16px;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:10px;
color:#222;
}

.title-item{
padding:12px;
background:#fafafa;
border-radius:10px;
margin-bottom:8px;
font-size:15px;
font-weight:600;
line-height:1.5;
border-left:4px solid #ff2442;
}

.content{
font-size:15px;
line-height:1.9;
white-space:pre-wrap;
word-break:break-word;
color:#333;
}

.tags{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.tag{
padding:6px 10px;
background:#fff1f2;
color:#ff2442;
border-radius:999px;
font-size:12px;
}

.cover{
background:#fafafa;
padding:12px;
border-radius:10px;
font-size:15px;
line-height:1.6;
margin-top:10px;
}

.actions{
display:flex;
gap:10px;
margin-top:14px;
}

.actions button{
flex:1;
height:46px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
font-weight:600;
}

.secondary{
background:#f2f2f2;
color:#333;
}

.primary{
background:#ff2442;
color:#fff;
}

.loading{
text-align:center;
padding:30px;
font-size:15px;
color:#666;
}

@media(max-width:768px){

.header{
font-size:22px;
padding:18px 12px;
}

.container{
padding:10px;
}

.card{
padding:14px;
}

.content{
font-size:15px;
line-height:1.9;
}

textarea{
height:110px;
}

}

</style>
</head>

<body>

<div class="header">
旧机工坊
<div class="subtitle">
记录每一台旧设备的时代记忆
</div>
</div>

<div class="container">

<div class="input-card">

<textarea
id="input"
placeholder="输入一台旧设备，例如：诺基亚N95、iPhone 4、摩托罗拉V3、索尼爱立信W595">
</textarea>

<button
class="main-btn"
onclick="generate()">
生成旧机档案
</button>

</div>

<div id="result"></div>

</div>

<script>

let lastData = null;

async function generate(){

const input =
document.getElementById("input").value.trim();

if(!input){

alert("请输入设备名称");

return;

}

document.getElementById("result").innerHTML = `
<div class="card">
<div class="loading">
正在翻阅这台设备的时代记忆...
</div>
</div>
`;

try{

const res = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
input
})
});

const data = await res.json();

lastData = data;

render(data);

}catch(err){

document.getElementById("result").innerHTML = `
<div class="card">
生成失败：${err.message}
</div>
`;

}

}

function render(data){

if(data.error){

document.getElementById("result").innerHTML = `
<div class="card">
${data.error}
</div>
`;

return;

}

document.getElementById("result").innerHTML = `

<div class="card">

<div class="section-title">
📌 推荐标题
</div>

${data.titles.map(
t => `
<div class="title-item">
${t}
</div>
`
).join("")}

<div class="section-title" style="margin-top:18px;">
📝 时代记忆
</div>

<div class="content">
${data.content}
</div>

<div class="section-title" style="margin-top:18px;">
🏷 推荐标签
</div>

<div class="tags">

${data.tags.map(
t => `
<div class="tag">
#${t}
</div>
`
).join("")}

</div>

<div class="section-title" style="margin-top:18px;">
📷 封面文案
</div>

<div class="cover">
${data.cover}
</div>

<div class="actions">

<button
class="secondary"
onclick="copyAll()">
复制全部
</button>

<button
class="primary"
onclick="generate()">
重新生成
</button>

</div>

</div>

`;

}

function copyAll(){

if(!lastData){

return;

}

const text =

`推荐标题：

${lastData.titles.join("\n")}

正文：

${lastData.content}

标签：

${lastData.tags.map(
t => "#" + t
).join(" ")}

封面文案：

${lastData.cover}`;

navigator.clipboard.writeText(text);

alert("已复制到剪贴板");

}

</script>

</body>
</html>
