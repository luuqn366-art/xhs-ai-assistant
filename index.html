<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI小红书助手</title>

<style>

body{
margin:0;
background:#f6f7fb;
font-family:Arial;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:100%;
max-width:900px;
background:white;
border-radius:16px;
padding:24px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
font-size:14px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
transition:0.2s;
}

#btn{
background:#1677ff;
color:white;
}

#btn:hover{
background:#0f5fd1;
}

#copyBtn{
background:#eee;
}

#copyBtn:hover{
background:#ddd;
}

.result{
margin-top:20px;
padding:16px;
background:#fafafa;
border-radius:12px;
white-space:pre-wrap;
min-height:120px;
border:1px solid #eee;
font-size:14px;
line-height:1.6;
}

.tag{
font-size:12px;
color:#888;
margin-top:10px;
}

.loading{
color:#999;
font-style:italic;
}

</style>

</head>

<body>

<div class="container">

<h1>AI小红书助手</h1>

<textarea id="input" placeholder="输入：诺基亚N95 / 摩托罗拉V3"></textarea>

<div class="row">
<button id="btn" onclick="generate()">生成内容</button>
<button id="copyBtn" onclick="copyText()">一键复制</button>
</div>

<div class="tag">支持：旧机博物馆 / 手机测评 / 闲鱼文案</div>

<div id="result" class="result">等待生成内容...</div>

</div>

<script>

let lastResult = "";

async function generate(){

const input =
document.getElementById("input").value;

if(!input){
alert("请输入内容");
return;
}

document.getElementById("result").innerHTML =
"<span class='loading'>生成中，请稍等...</span>";

try{

const res =
await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({input})
});

const data = await res.json();

lastResult = data.result;

document.getElementById("result").innerText =
lastResult || data.error;

}catch(e){

document.getElementById("result").innerText =
"请求失败：" + e.message;

}

}

function copyText(){

if(!lastResult){
alert("没有内容可复制");
return;
}

navigator.clipboard.writeText(lastResult);

alert("已复制");

}

</script>

</body>
</html>
