<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI小红书助手V2</title>

<style>

body{
margin:0;
font-family:-apple-system;
background:#f5f5f5;
}

.header{
background:#ff2442;
color:white;
padding:16px;
text-align:center;
font-weight:bold;
}

.container{
max-width:750px;
margin:20px auto;
padding:0 16px;
}

.input{
background:white;
padding:12px;
border-radius:12px;
}

textarea{
width:100%;
height:100px;
border:none;
outline:none;
font-size:14px;
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:#ff2442;
color:white;
cursor:pointer;
}

.card{
background:white;
margin-top:15px;
padding:16px;
border-radius:14px;
}

.title{
font-size:16px;
font-weight:600;
}

.tag{
color:#ff2442;
font-size:13px;
margin-top:8px;
line-height:1.6;
}

.content{
margin-top:10px;
white-space:pre-wrap;
line-height:1.6;
font-size:14px;
}

.small{
font-size:12px;
color:#888;
margin-top:10px;
}

.copyBtn{
margin-top:10px;
background:#f2f2f2;
color:#333;
}

</style>
</head>

<body>

<div class="header">AI小红书助手 V2</div>

<div class="container">

<div class="input">
<textarea id="input" placeholder="输入：诺基亚N95 / iPhone4 / V3"></textarea>
<button onclick="generate()">生成内容</button>
</div>

<div id="result"></div>

</div>

<script>

let lastData = null;

async function generate(){

const input = document.getElementById("input").value;

document.getElementById("result").innerHTML = "生成中...";

const res = await fetch("/api/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({input})
});

const data = await res.json();

lastData = data;

render(data);

}

function render(data){

if(data.error){
document.getElementById("result").innerHTML = data.error;
return;
}

document.getElementById("result").innerHTML = `

<div class="card">
<div class="title">标题</div>
<div>${data.titles.join(" | ")}</div>

<div class="title" style="margin-top:10px;">正文</div>
<div class="content">${data.content}</div>

<div class="title" style="margin-top:10px;">标签</div>
<div class="tag">${data.tags.map(t=>"#"+t).join(" ")}</div>

<div class="title" style="margin-top:10px;">封面</div>
<div>${data.cover}</div>

<button class="copyBtn" onclick="copyAll()">一键复制全文</button>

</div>

`;

}

function copyAll(){

if(!lastData) return;

const text =
`标题：${lastData.titles.join(" | ")}
正文：${lastData.content}
标签：${lastData.tags.map(t=>"#"+t).join(" ")}
封面：${lastData.cover}`;

navigator.clipboard.writeText(text);

alert("已复制");
}

</script>

</body>
</html>
